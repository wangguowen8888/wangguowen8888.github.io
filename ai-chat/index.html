<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>AI 聊天工具推荐（2026）</title>
    <meta name="description" content="覆盖聊天模型、推理工具、对比评测和高点击入口。" />
    <link rel="canonical" href="https://wangguowen8888.github.io/ai-chat/" />
    <meta name="theme-color" content="#0b1020" />
    <link rel="stylesheet" href="../assets/css/style.css" />
    <script defer src="../assets/js/site-config.js"></script>
    <script defer src="../assets/js/main.js"></script>
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1025508631552415"
     crossorigin="anonymous"></script>
  </head>
  <body data-root=".." data-page-kind="category" data-footer-kind="default" data-breadcrumb-current="AI 聊天工具推荐">
    <div data-site-topbar></div>
    <main class="post chat-page">
      <div class="container">
        <header>
          <div data-site-breadcrumb></div>
          <h1>AI 聊天室</h1>
          <p class="subtitle">纯聊天测试页面：输入问题 -> 发送 -> 等待回复。</p>
          <div class="byline">
            <span>后端模式（Cloudflare Worker）</span>
            <span>·</span>
            <a href="../tools/">查看工具合集</a>
          </div>
        </header>
        <section class="prose chat-panel" id="chat-tester">
          <h2>AI 聊天测试（限流版）</h2>
          <p>用于测试用户体验和成本控制。支持两种限制方式：每日 5 次 或 单次字数上限。</p>
          <div class="callout">
            <p style="margin:0"><strong>连接方式：</strong>默认只走你配置的后端接口（由 Codex 固定使用 <code>gpt-5.2</code>，禁止其它模型）。</p>
          </div>
          <div class="chat-conn-grid">
            <div>
              <label>连接模式</label>
              <select id="chat-conn-mode" disabled>
                <option value="backend">后端接口（chatApiEndpoint）</option>
              </select>
            </div>
            <div>
              <label>模型</label>
              <input id="chat-model" type="text" value="gpt-5.2" disabled />
            </div>
          </div>
          <div class="chat-conn-grid" style="display:none">
            <div style="grid-column: span 2;">
              <label>API Key（仅本地）</label>
              <input id="chat-api-key" type="password" placeholder="sk-..." autocomplete="off" />
              <p class="meta">不会写入仓库，仅保存在你当前浏览器 localStorage。</p>
            </div>
          </div>
          <div class="chat-limiter">
            <label>限制模式</label>
            <select id="chat-limit-mode">
              <option value="daily">每日 5 次</option>
              <option value="chars">单次最多 500 字</option>
            </select>
            <p id="chat-limit-hint" class="meta">今日剩余 5/5 次</p>
          </div>
          <div id="chat-messages" class="chat-messages" aria-live="polite"></div>
          <div class="chat-input-wrap">
            <textarea id="chat-input" rows="4" placeholder="输入你要测试的问题..."></textarea>
            <div class="chat-actions">
              <small id="chat-char-count">0 / 500</small>
              <button id="chat-send" class="btn primary" type="button">发送测试</button>
            </div>
          </div>
        </section>
    
      </div>
    </main>
    <div data-site-footer></div>
  </body>
</html>
