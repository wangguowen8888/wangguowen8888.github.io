<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="t d">
  <title id="t">AI side hustle formula</title>
  <desc id="d">income equals demand times efficiency times traffic</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#eff6ff"/>
      <stop offset="100%" stop-color="#f5f3ff"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="620" fill="url(#bg)"/>
  <text x="600" y="80" fill="#0f172a" font-size="42" text-anchor="middle" font-family="Segoe UI, Arial" font-weight="700">2026 AI Side Hustle Formula</text>
  <rect x="130" y="170" width="260" height="170" rx="18" fill="#ffffff" stroke="#bfdbfe"/>
  <rect x="470" y="170" width="260" height="170" rx="18" fill="#ffffff" stroke="#bbf7d0"/>
  <rect x="810" y="170" width="260" height="170" rx="18" fill="#ffffff" stroke="#ddd6fe"/>
  <text x="260" y="245" fill="#0369a1" font-size="38" text-anchor="middle" font-family="Segoe UI, Arial">Demand</text>
  <text x="600" y="245" fill="#15803d" font-size="38" text-anchor="middle" font-family="Segoe UI, Arial">Efficiency</text>
  <text x="940" y="245" fill="#6d28d9" font-size="38" text-anchor="middle" font-family="Segoe UI, Arial">Traffic</text>
  <text x="260" y="295" fill="#334155" font-size="24" text-anchor="middle" font-family="Segoe UI, Arial">People pay for it</text>
  <text x="600" y="295" fill="#334155" font-size="24" text-anchor="middle" font-family="Segoe UI, Arial">AI boosts output</text>
  <text x="940" y="295" fill="#334155" font-size="24" text-anchor="middle" font-family="Segoe UI, Arial">Steady acquisition</text>
  <text x="600" y="420" fill="#0f172a" font-size="56" text-anchor="middle" font-family="Segoe UI, Arial">Income = Demand x Efficiency x Traffic</text>
  <text x="600" y="500" fill="#475569" font-size="26" text-anchor="middle" font-family="Segoe UI, Arial">Fast output without traffic still means no revenue</text>
</svg>
