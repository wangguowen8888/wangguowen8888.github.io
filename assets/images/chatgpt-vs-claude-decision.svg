<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620" role="img" aria-labelledby="t d">
  <title id="t">ChatGPT vs Claude Decision</title>
  <desc id="d">Bright decision flow chart</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#f0f9ff"/>
      <stop offset="100%" stop-color="#faf5ff"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="620" fill="url(#bg)"/>
  <text x="600" y="70" fill="#0f172a" font-size="38" text-anchor="middle" font-family="Segoe UI, Arial" font-weight="700">Which subscription should you pick?</text>

  <rect x="420" y="112" width="360" height="90" rx="16" fill="#ffffff" stroke="#cbd5e1"/>
  <text x="600" y="168" fill="#1e293b" font-size="24" text-anchor="middle" font-family="Segoe UI, Arial">What is your primary use case?</text>

  <line x1="600" y1="202" x2="330" y2="265" stroke="#38bdf8" stroke-width="4"/>
  <line x1="600" y1="202" x2="870" y2="265" stroke="#a78bfa" stroke-width="4"/>

  <rect x="80" y="265" width="500" height="250" rx="20" fill="#ffffff" stroke="#bae6fd"/>
  <rect x="620" y="265" width="500" height="250" rx="20" fill="#ffffff" stroke="#ddd6fe"/>

  <text x="330" y="315" fill="#0369a1" font-size="30" text-anchor="middle" font-family="Segoe UI, Arial" font-weight="700">Choose ChatGPT Plus</text>
  <text x="120" y="362" fill="#0f172a" font-size="22" font-family="Segoe UI, Arial">- Need voice and image workflows</text>
  <text x="120" y="396" fill="#0f172a" font-size="22" font-family="Segoe UI, Arial">- Heavy mobile usage</text>
  <text x="120" y="430" fill="#0f172a" font-size="22" font-family="Segoe UI, Arial">- Want one-stop ecosystem</text>

  <text x="870" y="315" fill="#6d28d9" font-size="30" text-anchor="middle" font-family="Segoe UI, Arial" font-weight="700">Choose Claude Pro</text>
  <text x="660" y="362" fill="#0f172a" font-size="22" font-family="Segoe UI, Arial">- Long-form writing and editing</text>
  <text x="660" y="396" fill="#0f172a" font-size="22" font-family="Segoe UI, Arial">- Long-context document analysis</text>
  <text x="660" y="430" fill="#0f172a" font-size="22" font-family="Segoe UI, Arial">- Artifacts-driven dev workflow</text>

  <text x="600" y="575" fill="#475569" font-size="22" text-anchor="middle" font-family="Segoe UI, Arial">Best practice: one main subscription + API as backup</text>
</svg>
